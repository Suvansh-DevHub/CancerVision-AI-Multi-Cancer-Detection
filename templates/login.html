<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2d3748;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 15px;
            color: #2d3748;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        input::placeholder {
            color: #a0aec0;
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .login-button:hover {
            background: #3182ce;
        }

        .divider {
            text-align: center;
            color: #a0aec0;
            font-size: 14px;
            margin: 28px 0 24px;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #e2e8f0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .social-button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .social-button:hover {
            opacity: 0.9;
        }

        .google {
            background: #ea4335;
            color: white;
            grid-column: 1;
        }

        .twitter {
            background: #1da1f2;
            color: white;
            grid-column: 2;
        }

        .linkedin {
            background: #0077b5;
            color: white;
            grid-column: 3;
        }

        .github {
            background: #333;
            color: white;
            grid-column: 2;
        }

        .social-button svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .signup-link {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .signup-link a {
            color: #4299e1;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .cancel-button {
            width: 100%;
            padding: 14px;
            background: #a0aec0;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cancel-button:hover {
            background: #718096;
        }

        /* ===== floating stars, same size & behavior as contact page icons ===== */
        .floating-icons-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            /* keep behind login container (set .login-container z-index > 0) */
            pointer-events: none;
            /* never block clicks */
        }

        .floating-icons-stars .star {
            position: absolute;
            color: rgba(0, 0, 0, 0.25);
            text-shadow: 0 0 10px rgba(11, 51, 81, 0.25),
                0 0 20px rgba(11, 51, 81, 0.20);
            font-size: 38px;
            /* same base visual size as contact icons */
            opacity: 0;
            will-change: transform, opacity;
            animation: floatAndFade 8s ease-in-out forwards;
            transform-origin: center;
        }

        /* star SVG inside the element scales to the element */
        .floating-icons-stars .star svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* reuse contact page keyframes for identical motion */
        @keyframes floatAndFade {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.8);
            }

            10% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.22;
                transform: translate(var(--tx), var(--ty)) scale(1);
            }

            90% {
                opacity: 0.1;
            }

            100% {
                opacity: 0;
                transform: translate(calc(var(--tx) * 1.5), calc(var(--ty) * 1.5)) scale(0.9);
            }
        }

        /* ensure your login box sits above */
        .login-container {
            position: relative;
            z-index: 1;
        }

        /* performance: reduce motion on prefers-reduced-motion */
        @media (prefers-reduced-motion: reduce) {
            .floating-icons-stars .star {
                animation: none;
                opacity: .6;
                transform: translateY(-8px) scale(.95);
            }
        }

        /* ===== Smooth Background Animation (White ↔ Light Sky Blue) ===== */
        body {
            background: linear-gradient(120deg, #ffffff, #d6f1ff, #cdefff);
            background-size: 200% 200%;
            animation: bgColorShift 12s ease-in-out infinite alternate;
        }

        /* color transition animation */
        @keyframes bgColorShift {
            0% {
                background-position: 0% 50%;
                background-color: #ffffff;
            }

            50% {
                background-position: 100% 50%;
                background-color: #000000;
            }

            100% {
                background-position: 0% 50%;
                background-color: #cdefff;
            }
        }
    </style>
</head>

<body>
    <!-- full-page floating stars (same size/behavior as contact page icons) -->
    <div class="floating-icons-stars" aria-hidden="true"></div>

    <div class="login-container">
        <h1>Login</h1>

        {% if error %}
        <p style="color:#e53e3e; text-align:center; margin-bottom:16px; font-size:14px;">
            {{ error }}
        </p>
        {% endif %}

        <form id="loginForm" method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email or Username</label>
                <input type="text" id="email" name="email" placeholder="Enter your email or username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password">
            </div>

            <button type="submit" class="login-button">Login</button>
        </form>

        <div class="divider">Or login with</div>

        <div class="social-buttons">
            <button class="social-button google" onclick="handleSocialLogin('google')">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Google
            </button>

            <button class="social-button twitter" onclick="handleSocialLogin('twitter')">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z" />
                </svg>
                Twitter
            </button>

            <button class="social-button linkedin" onclick="handleSocialLogin('linkedin')">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                </svg>
                LinkedIn
            </button>

            <button class="social-button github" onclick="handleSocialLogin('github')">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
                GitHub
            </button>
        </div>

        <div class="signup-link">
            Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a>
        </div>

        <button class="cancel-button" onclick="handleCancel()">Cancel</button>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert('Please fill in all fields');
                e.preventDefault(); // sirf yaha use ho raha hai (correct place)
                return;
            }
        });

        function handleSocialLogin(provider) {
            console.log('Social login with:', provider);
            alert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} login would be implemented here`);
        }

        function handleSignup(e) {
            e.preventDefault();
            console.log('Navigate to signup');
            alert('Sign up page would be shown here');
        }

        function handleCancel() {
            console.log('Cancel login');
            window.location.href = "{{ url_for('index') }}";
        }
    </script>

    <script>
        (function spawnFloatingStars() {
            const container = document.querySelector('.floating-icons-stars');
            if (!container) return;

            // SVG star path (same shape used earlier)
            const starSVG = color => `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path fill="${color}" d="M12 2.6l1.9 4.2 4.6.7-3.3 3.2.8 4.6L12 13.8 7.9 15.3l.8-4.6L5.4 7.5l4.6-.7L12 2.6z"/>
  </svg>`;

            const colors = ['#ffffff', '#000000', '#a0f0ff', '#ffd6e8']; // star fill options
            const spawnIntervalMs = 1500;   // matches contact code timing
            const initialBurst = 6;
            const maxAlive = 10;            // cap icons on screen for perf
            let alive = 0;
            let intervalId = null;

            function createStar() {
                if (alive >= maxAlive) return;
                const el = document.createElement('i');
                el.className = 'star';
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                // drift amounts and duration (match contact logic ranges)
                const tx = (Math.random() - 0.5) * 200;   // -100..+100 px
                const ty = (Math.random() - 0.5) * 200;   // -100..+100 px
                const size = 30 + Math.random() * 25;     // 30..55 (similar feel to contact icons)
                const dur = 6 + Math.random() * 4;        // 6..10 seconds

                el.style.left = `${x}px`;
                el.style.top = `${y}px`;
                el.style.fontSize = `${size}px`;
                el.style.setProperty('--tx', `${tx}px`);
                el.style.setProperty('--ty', `${ty}px`);
                el.style.animationDuration = `${dur}s`;

                // pick a color & set innerSVG
                const color = colors[Math.floor(Math.random() * colors.length)];
                el.innerHTML = starSVG(color);

                container.appendChild(el);
                alive++;

                // Remove element after animation ends (+ small buffer)
                setTimeout(() => {
                    try { el.remove(); } catch (e) { }
                    alive = Math.max(0, alive - 1);
                }, (dur + 1) * 1000);
            }

            // initial burst
            for (let i = 0; i < initialBurst; i++) setTimeout(createStar, i * 400);

            // continuous spawn
            intervalId = setInterval(() => {
                if (document.hidden) return; // pause when tab not active
                createStar();
            }, spawnIntervalMs);

            // cleanup on page unload
            window.addEventListener('beforeunload', () => { if (intervalId) clearInterval(intervalId); });

            // optional controls
            window.stopFloatingStars = function () {
                if (intervalId) clearInterval(intervalId);
                container.innerHTML = '';
            };
        })();
    </script>

</body>

</html>
